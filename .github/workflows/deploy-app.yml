name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: github.repository == 'Qryptumorg/app'
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout qryptair repo (public)
        uses: actions/checkout@v4
        with:
          repository: Qryptumorg/qryptair
          path: _qryptair

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # ── 1. BUILD LANDING ─────────────────────────────────────────────
      # outDir = landing/dist/public/ (path.resolve(__dirname, 'dist/public'))
      - name: Install landing dependencies
        working-directory: landing
        run: pnpm install --no-frozen-lockfile

      - name: Build landing (base = /app/)
        working-directory: landing
        env:
          NODE_ENV: production
          PORT: '3000'
          BASE_PATH: /app/
        run: pnpm run build

      - name: Check landing output
        run: |
          echo "=== landing/dist/ ===" && ls landing/dist/ 2>/dev/null || echo "MISSING: landing/dist/"
          echo "=== landing/dist/public/ ===" && ls landing/dist/public/ 2>/dev/null | head -10 || echo "MISSING: landing/dist/public/"

      # ── 2. BUILD SHIELD ──────────────────────────────────────────────
      # outDir = dist/public/ (repo root)
      - name: Install shield-app dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build ShieldTransfer (base = /app/app/)
        env:
          NODE_ENV: production
          PORT: '3000'
          BASE_PATH: /app/app/
          VITE_DEPLOY_TARGET: app
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
          VITE_REOWN_PROJECT_ID: ${{ secrets.VITE_REOWN_PROJECT_ID }}
        run: pnpm run build

      - name: Check shield output
        run: |
          echo "=== dist/public/ ===" && ls dist/public/ 2>/dev/null | head -10 || echo "MISSING: dist/public/"

      # ── 3. BUILD QRYPTAIR ────────────────────────────────────────────
      - name: Install qryptair dependencies
        working-directory: _qryptair
        run: pnpm install --no-frozen-lockfile

      - name: Build QryptAir (base = /app/qryptair/)
        working-directory: _qryptair
        env:
          NODE_ENV: production
          PORT: '3001'
          BASE_PATH: /app/qryptair/
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
          VITE_REOWN_PROJECT_ID: ${{ secrets.VITE_REOWN_PROJECT_ID }}
        run: pnpm run build

      - name: Check qryptair output
        run: |
          echo "=== _qryptair/dist* ===" && ls _qryptair/dist* 2>/dev/null | head -10 || true
          echo "=== _qryptair/dist/ ===" && ls _qryptair/dist/ 2>/dev/null | head -10 || echo "MISSING: _qryptair/dist/"
          echo "=== _qryptair/dist/public/ ===" && ls _qryptair/dist/public/ 2>/dev/null | head -5 || echo "no dist/public"

      # ── 4. ASSEMBLE FINAL PAGES DIRECTORY ───────────────────────────
      - name: Assemble pages output
        run: |
          set -euo pipefail
          mkdir -p _pages/app _pages/qryptair

          # Shield -> _pages/app/
          echo "--- Copying shield to _pages/app/ ---"
          cp -r dist/public/. _pages/app/

          # QryptAir -> _pages/qryptair/
          echo "--- Copying qryptair to _pages/qryptair/ ---"
          if [ -d "_qryptair/dist/public" ]; then
            cp -r _qryptair/dist/public/. _pages/qryptair/
          else
            cp -r _qryptair/dist/. _pages/qryptair/
          fi

          # Landing -> _pages/ (LAST so it goes to root, not overwritten)
          echo "--- Copying landing to _pages/ ---"
          if [ -d "landing/dist/public" ]; then
            cp -r landing/dist/public/. _pages/
          else
            cp -r landing/dist/. _pages/
          fi

          # SPA 404 fallback
          cp _pages/index.html _pages/404.html

          echo "=== Final structure ==="
          find _pages -maxdepth 2 -type d
          du -sh _pages

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
