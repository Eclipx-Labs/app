name: Deploy to IPFS (eth.limo)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-ipfs:
    runs-on: ubuntu-latest
    if: github.repository == 'Qryptumorg/app'
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build for IPFS (base path = /)
        env:
          NODE_ENV: production
          PORT: '3000'
          BASE_PATH: '/'
          VITE_PROOF_SALT: ${{ secrets.VITE_PROOF_SALT }}
          VITE_SHIELD_FACTORY_SEPOLIA: ${{ secrets.VITE_SHIELD_FACTORY_SEPOLIA }}
          VITE_SHIELD_FACTORY_V6_SEPOLIA: ${{ secrets.VITE_SHIELD_FACTORY_V6_SEPOLIA }}
        run: |
          pnpm run build
          echo "=== Build size (excl .map) ==="
          du -sh dist/public

      - name: Upload to Pinata IPFS
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          cat > /tmp/pinata-upload.mjs << 'NODEEOF'
          import fs from 'fs';
          import path from 'path';

          function getFiles(dir, base) {
            if (!base) base = dir;
            const out = [];
            for (const e of fs.readdirSync(dir, { withFileTypes: true })) {
              const full = path.join(dir, e.name);
              if (e.isDirectory()) out.push(...getFiles(full, base));
              else {
                const rel = path.relative(base, full);
                if (!rel.endsWith('.map')) out.push({ full, rel });
              }
            }
            return out;
          }

          // Resolve subfolder CID from root CID using IPFS gateway dag-json
          async function resolveFolderCid(rootCid, folderName) {
            const gateways = [
              'https://ipfs.io',
              'https://dweb.link',
              'https://w3s.link',
            ];
            for (const gw of gateways) {
              try {
                const r = await fetch(gw + '/ipfs/' + rootCid + '?format=dag-json', {
                  headers: { Accept: 'application/vnd.ipld.dag-json' },
                  signal: AbortSignal.timeout(8000),
                });
                if (r.ok) {
                  const dag = await r.json();
                  const links = dag.Links || dag.links || [];
                  const link = links.find(l => (l.Name || l.name) === folderName);
                  if (link) {
                    const hash = link.Hash;
                    return typeof hash === 'string' ? hash : hash['/'];
                  }
                }
              } catch {}
            }
            return null;
          }

          const jwt = process.env.PINATA_JWT;
          const sha = (process.env.COMMIT_SHA || 'unknown').slice(0, 7);
          const folder = 'qryptum-app-' + sha;
          const entries = getFiles('./dist/public');

          let totalBytes = 0;
          const data = new FormData();

          for (const { full, rel } of entries) {
            const bytes = fs.readFileSync(full);
            totalBytes += bytes.length;
            const filePath = folder + '/' + rel;
            data.append('file', new File([bytes], filePath), filePath);
          }

          data.append('pinataMetadata', JSON.stringify({ name: folder }));
          data.append('pinataOptions', JSON.stringify({ cidVersion: 1 }));

          console.log('Files  :', entries.length, '(source maps excluded)');
          console.log('Size   :', (totalBytes / 1024 / 1024).toFixed(2), 'MB');
          console.log('Folder :', folder);
          console.log('Uploading to Pinata...');

          const res = await fetch('https://api.pinata.cloud/pinning/pinFileToIPFS', {
            method: 'POST',
            headers: { Authorization: 'Bearer ' + jwt, Source: 'sdk/fileArray' },
            body: data,
          });

          const text = await res.text();
          console.log('HTTP   :', res.status);

          let result;
          try { result = JSON.parse(text); }
          catch { console.error('Bad response:', text.slice(0, 500)); process.exit(1); }

          if (!result.IpfsHash) {
            console.error('Pinata error:', JSON.stringify(result));
            process.exit(1);
          }

          const rootCid = result.IpfsHash;
          console.log('Root CID  :', rootCid);

          // Resolve the subfolder CID — this is what goes into ENS contenthash
          console.log('Resolving folder CID from IPFS...');
          const folderCid = await resolveFolderCid(rootCid, folder);

          const ensCid = folderCid || rootCid;
          const ensPath = folderCid ? '' : '/' + folder + '/';
          const appUrl = folderCid
            ? 'https://' + folderCid + '.ipfs.cf-ipfs.com/'
            : 'https://' + rootCid + '.ipfs.cf-ipfs.com/' + folder + '/';

          console.log('');
          if (folderCid) {
            console.log('Folder CID:', folderCid);
            console.log('(Use this CID for ENS contenthash)');
          } else {
            console.log('WARNING: Could not resolve folder CID. Using root CID.');
            console.log('App is at: ipfs://' + rootCid + '/' + folder + '/');
          }
          console.log('');
          console.log('===== IPFS Upload Success =====');
          console.log('App URL   :', appUrl);
          console.log('');
          console.log('Set ENS contenthash on qryptum.eth:');
          console.log('  1. https://app.ens.domains/qryptum.eth');
          console.log('  2. Edit Records -> Content Hash');
          console.log('  3. Enter: ipfs://' + ensCid);
          console.log('  4. Save (ETH gas required)');
          console.log('===============================');

          const summary = [
            '## IPFS Deploy',
            '',
            '| | |',
            '|---|---|',
            '| **Commit** | ' + sha + ' |',
            folderCid ? '| **Folder CID** | `' + folderCid + '` |' : '| **Root CID** | `' + rootCid + '` |',
            '| **App URL** | ' + appUrl + ' |',
            '',
            '### Set contenthash on qryptum.eth',
            '1. https://app.ens.domains/qryptum.eth',
            '2. Edit Records -> Content Hash',
            '3. Enter: `ipfs://' + ensCid + '`',
            '4. Save (gas required on Ethereum mainnet)',
            '',
            folderCid
              ? 'After ENS update: https://qryptum.eth.limo will serve index.html directly.'
              : 'After ENS update: https://qryptum.eth.limo/' + folder + '/ will serve the app.',
          ].join('\n');

          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, summary);
          NODEEOF

          node /tmp/pinata-upload.mjs
